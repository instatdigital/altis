name: macOS

on:
  push:
    branches:
      - main

jobs:
  build-and-upload:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install certificate
        env:
          MAC_CERT_P12: ${{ secrets.MAC_CERT_P12 }}
          MAC_CERT_P12_PASSWORD: ${{ secrets.MAC_CERT_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$MAC_CERT_P12" | base64 --decode -o $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$MAC_CERT_P12_PASSWORD" \
            -A -T /usr/bin/codesign -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user \
            -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)

      - name: Install provisioning profile
        env:
          MAC_PROVISIONING_PROFILE: ${{ secrets.MAC_PROVISIONING_PROFILE }}
        run: |
          # macOS profiles use .provisionprofile, not .mobileprovision
          PP_PATH=$RUNNER_TEMP/profile.provisionprofile
          echo "$MAC_PROVISIONING_PROFILE" | base64 --decode -o "$PP_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          security cms -D -i "$PP_PATH" > $RUNNER_TEMP/profile.plist
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" $RUNNER_TEMP/profile.plist)
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".provisionprofile

      - name: Set up App Store Connect API key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_API_KEY_CONTENT" | base64 --decode \
            -o ~/.private_keys/AuthKey_${ASC_API_KEY_ID}.p8

      - name: Build archive
        env:
          PROFILE_NAME: ${{ vars.MAC_PROVISIONING_PROFILE_NAME }}
          TEAM_ID: ${{ secrets.DEVELOPMENT_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project apple/macos/AltisMacOS.xcodeproj \
            -scheme AltisMacOS \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Altis.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER=com.altis.instat \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            MARKETING_VERSION=1.0.0

      - name: Export archive
        env:
          PROFILE_NAME: ${{ vars.MAC_PROVISIONING_PROFILE_NAME }}
        run: |
          # method=app-store is correct for macOS TestFlight (not app-store-connect)
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.altis.instat</key>
              <string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Altis.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          PKG=$(find $RUNNER_TEMP/export -name "*.pkg" | head -1)
          xcrun altool --upload-app \
            --file "$PKG" \
            --type macos \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_KEY_ISSUER_ID" \
            --verbose

      - name: Clean up keychain and profiles
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/*.provisionprofile || true
          rm -f ~/.private_keys/AuthKey_*.p8 || true
