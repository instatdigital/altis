name: macOS

on:
  push:
    branches:
      - main

jobs:
  build-and-upload:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Import certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MAC_CERT_P12 }}
          p12-password: ${{ secrets.MAC_CERT_P12_PASSWORD }}
          # The action creates and manages the keychain automatically.
          # A second certificate (Mac Installer Distribution) is imported below
          # via a separate invocation using the same keychain.
          create-keychain: true
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Import Mac Installer Distribution certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MAC_INSTALLER_CERT_P12 }}
          p12-password: ${{ secrets.MAC_INSTALLER_CERT_P12_PASSWORD }}
          create-keychain: false
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Download provisioning profiles
        uses: apple-actions/download-provisioning-profiles@v3
        with:
          bundle-id: com.altis.instat
          profile-type: MAC_APP_STORE
          issuer-id: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_API_KEY_ID }}
          api-private-key: ${{ secrets.ASC_API_KEY_CONTENT }}

      - name: Set up App Store Connect API key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_API_KEY_CONTENT" > ~/.private_keys/AuthKey_${ASC_API_KEY_ID}.p8

      - name: Resolve provisioning profile UUID
        run: |
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.provisionprofile | head -1)
          security cms -D -i "$PROFILE_PATH" > $RUNNER_TEMP/profile.plist
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" $RUNNER_TEMP/profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" $RUNNER_TEMP/profile.plist)
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV

      - name: Build archive
        env:
          TEAM_ID: ${{ secrets.DEVELOPMENT_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project apple/macos/AltisMacOS.xcodeproj \
            -scheme AltisMacOS \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Altis.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER=com.altis.instat \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            MARKETING_VERSION=1.0.0

      - name: Export archive
        env:
          TEAM_ID: ${{ secrets.DEVELOPMENT_TEAM_ID }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>installerSigningCertificate</key>
            <string>3rd Party Mac Developer Installer</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.altis.instat</key>
              <string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Altis.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          PKG=$(find $RUNNER_TEMP/export -name "*.pkg" | head -1)
          xcrun altool --upload-app \
            --file "$PKG" \
            --type macos \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_KEY_ISSUER_ID" \
            --verbose

      - name: Clean up keychain and profiles
        if: always()
        run: |
          security delete-keychain signing_temp.keychain-db || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/*.provisionprofile || true
          rm -f ~/.private_keys/AuthKey_*.p8 || true
